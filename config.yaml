
model_chain:
  - name: "ollama"            # primary model/provider
    max_retries: 3
  - name: "anthropic"
    max_retries: 2
    temperature: 0.3          # cooler than provider default
    max_tokens: 500
  - name: "openai"
    max_retries: 1
    temperature: 0.2

# External operation retry configuration
retry_config:
  max_attempts: 3               # Maximum number of retry attempts
  base_delay: 1.0              # Base delay in seconds between retries
  max_delay: 60.0              # Maximum delay in seconds between retries
  exponential_base: 2.0        # Exponential backoff multiplier
  max_total_duration: 300      # Maximum total duration in seconds for all retries
  enabled: true                # Whether retries are enabled globally

# Model configurations
providers:
  # OpenAI Configuration
  openai:
    enabled: false
    default_model: gpt-3.5-turbo
    # Model list now accepts either plain strings (inherit provider defaults)
    # or detailed mapping objects that override any parameter.
    models:
      - name: gpt-4o               # No overrides – uses provider defaults

      # Override some parameters just for this family
      - name: gpt-4-turbo-preview
        temperature: 0.3           # Slightly more deterministic
        max_tokens: 4000           # Allow longer responses

      # Plain string still works (provider defaults apply)
      - gpt-4-0125-preview

      # Override single field
      - name: gpt-4-32k
        max_tokens: 8000

      # Remaining 3.5-series
      - gpt-3.5-turbo
      - gpt-3.5-turbo-16k
      - gpt-3.5-turbo-0125
    temperature: 0.7      # Higher = more creative, Lower = more focused
    max_tokens: 1000     # Maximum length of response
    top_p: 1.0          # Alternative to temperature for sampling
    frequency_penalty: 0.0  # Reduce repetition of token sequences
    presence_penalty: 0.0   # Reduce repetition of topics

  # Anthropic Configuration
  anthropic:
    enabled: false
    default_model: claude-3-opus-20240229
    models:
      - name: claude-3-opus-20240229
        temperature: 0.2           # Make Claude more factual
        max_tokens: 4000
      - claude-3-sonnet-20240229   # Uses provider defaults
      - name: claude-3-haiku-20240307
        temperature: 0.4
      - claude-2.1
      - claude-2.0
    temperature: 0.7     # Higher = more creative, Lower = more focused
    max_tokens: 1000    # Maximum length of response
    top_k: 50          # Limit vocabulary for sampling
    top_p: 1.0         # Alternative to temperature for sampling

  # Ollama Configuration
  ollama:
    enabled: true
    default_model: llama3.2:1b
    models:
      - llama3.2:1b                # Inherits provider defaults
      - name: llama2
        temperature: 0.4
      - mixtral
      - name: neural-chat
        top_p: 0.95
      - codellama
      - dolphin-phi
      - starling-lm
      - phi
      - gemma
      - mistral
      - tinyllama
    temperature: 0.7       # Higher = more creative, Lower = more focused
    context_size: 4096     # Maximum context size
    num_ctx: 4096         # Context window size
    num_gpu: 1           # Number of GPUs to use
    num_thread: 4        # Number of CPU threads
    repeat_penalty: 1.1  # Penalty for repeated tokens
    top_k: 40           # Top-k sampling
    top_p: 0.9          # Top-p sampling