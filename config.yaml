# Default model to use (options: openai, anthropic, ollama)
default_model: "ollama"
#default_model: "openai"
#default_model: "anthropic"


# Model configurations
models:
  # OpenAI Configuration
  openai:
    enabled: false
    # Available models (uncomment one):
    
    # GPT-4 Models
    # model: "gpt-4-turbo-preview"  # Latest GPT-4, fastest, most capable, cheaper than GPT-4
    # model: "gpt-4-0125-preview"   # Similar to turbo but fixed version
    # model: "gpt-4"                # Original GPT-4, high capability
    # model: "gpt-4-32k"            # Original GPT-4 with 32k context
    
    # GPT-3.5 Models
    # model: "gpt-3.5-turbo"        # Fast, good value for most tasks
    # model: "gpt-3.5-turbo-16k"    # Same as 3.5 but with 16k context
    # model: "gpt-3.5-turbo-0125"   # Latest fixed version, most reliable
    
    # Settings
    temperature: 0.7      # Higher = more creative, Lower = more focused
    max_tokens: 1000     # Maximum length of response
    top_p: 1.0          # Alternative to temperature for sampling
    frequency_penalty: 0.0  # Reduce repetition of token sequences
    presence_penalty: 0.0   # Reduce repetition of topics

  # Anthropic Configuration
  anthropic:
    enabled: false
    # Available models (uncomment one):
    
    # Claude 3 Models (Latest)
    # model: "claude-3-opus-20240229"     # Most powerful, best for complex tasks
    # model: "claude-3-sonnet-20240229"   # Great balance of speed and capability
    # model: "claude-3-haiku-20240307"    # Fastest, most cost-effective
    
    # Claude 2 Models
    # model: "claude-2.1"                 # Previous generation, still capable
    # model: "claude-2.0"                 # Older but stable version
    
    # Settings
    temperature: 0.7     # Higher = more creative, Lower = more focused
    max_tokens: 1000    # Maximum length of response
    top_k: 50          # Limit vocabulary for sampling
    top_p: 1.0         # Alternative to temperature for sampling

  # Ollama Configuration
  ollama:
    enabled: true
    # Available models (uncomment one):
    
    # Large Models
    model: llama3.2:1b
    
    # model: "llama2"        # Meta's Llama 2, good all-rounder
    # model: "mixtral"       # Mixture of experts, very capable
    # model: "neural-chat"   # Optimized for chat, good performance
    
    # Specialized Models
    # model: "codellama"     # Optimized for code generation
    # model: "dolphin-phi"   # Improved Phi model with chat
    # model: "starling-lm"   # High quality small model
    
    # Efficient Models
    # model: "phi"           # Microsoft's small but capable model
    # model: "gemma"         # Google's efficient model
    # model: "mistral"       # Mistral AI's base model
    # model: "tinyllama"     # Tiny but fast model
    
    # Settings
    temperature: 0.7       # Higher = more creative, Lower = more focused
    context_size: 4096     # Maximum context size
    num_ctx: 4096         # Context window size
    num_gpu: 1           # Number of GPUs to use
    num_thread: 4        # Number of CPU threads
    repeat_penalty: 1.1  # Penalty for repeated tokens
    top_k: 40           # Top-k sampling
    top_p: 0.9          # Top-p sampling

# Validation settings
validation:
  enabled: true
  max_retries: 3
  fallback_models: ["anthropic", "openai"]  # Models to try if primary fails
  validators:
    - type: "html"      # HTML validation
    # - type: "json"    # JSON validation
    # - type: "regex"   # Regex validation
    # - type: "length"  # Length validation