name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --tb=short -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Verify built version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls dist/*.whl)
          echo "Tag version: $TAG"
          echo "Built wheel: $WHEEL"
          if [[ "$WHEEL" != *"$TAG"* ]]; then
            echo "ERROR: Wheel version does not match tag $TAG"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1