[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    docker: marks tests that require Docker to be running
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: marks tests as unit tests
    security: marks tests that test security features

# Default behavior - exclude integration tests unless explicitly requested
# Run integration tests with: pytest -m integration
# Run without slow tests: pytest -m "not slow"
addopts = -v --tb=short -m "not integration"

# Asyncio configuration
asyncio_mode = auto

# Warning filters
filterwarnings =
    ignore::pytest.PytestDeprecationWarning
    ignore::DeprecationWarning

# Minimum version requirements
minversion = 6.0 